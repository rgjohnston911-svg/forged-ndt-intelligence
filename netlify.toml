[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# Cross-domain deliberation orchestrator runs all 6 specialists
# serially (~50s worst case at full thinking budgets). 26s is the
# Pro-plan sync timeout ceiling — partial results are persisted to
# cd_deliberation_log as each specialist completes, so a timeout
# does not lose progress. Sprint 3 will chunked-async this so each
# specialist runs in its own function.
[functions."cross-domain-deliberate"]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Landing page is the root
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/system-check.html"
  to = "/system-check.html"
  status = 200

[[redirects]]
  from = "/landing.html"
  to = "/landing.html"
  status = 200

# AI Assistant PWA
[[redirects]]
  from = "/assistant"
  to = "/assistant.html"
  status = 200

[[redirects]]
  from = "/assistant.html"
  to = "/assistant.html"
  status = 200

# React app at /app and all other routes
[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
