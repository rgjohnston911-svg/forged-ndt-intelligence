[build]
  command = "npm run test:gates && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# Sprint 3: cross-domain-deliberate is now a trigger-only endpoint
# (validates request, creates pending cd_deliberation_log row,
# fire-and-forget POSTs to cross-domain-deliberate-background,
# returns 202 in <1s). No per-function timeout override needed —
# default sync timeout is plenty.
#
# cross-domain-deliberate-background.ts is auto-detected as a
# Netlify Background Function by the `-background` filename suffix.
# Background Functions get a 15-minute ceiling vs. 26s sync — that
# is what makes real 6-AI deliberations (30-100s realistic) fit.

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Landing page is the root
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/system-check.html"
  to = "/system-check.html"
  status = 200

[[redirects]]
  from = "/landing.html"
  to = "/landing.html"
  status = 200

# AI Assistant PWA
[[redirects]]
  from = "/assistant"
  to = "/assistant.html"
  status = 200

[[redirects]]
  from = "/assistant.html"
  to = "/assistant.html"
  status = 200

# React app at /app and all other routes
[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
