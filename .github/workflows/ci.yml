name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Acceptance gates (deterministic engines)
        run: npm run test:gates
      - name: Unit suite
        run: npm test
      - name: SA eval (multi-domain governing-reality + anti-contamination corpus)
        run: npm run eval
