var results = [];

function addResult(name, status, ms, detail) {
  results.push({ name: name, status: status, ms: ms, detail: detail });
  renderResults();
}

function renderResults() {
  var html = "";
  var pass = 0, fail = 0, warn = 0, totalMs = 0;
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    if (r.status === "pass") pass++;
    else if (r.status === "fail") fail++;
    else warn++;
    totalMs += r.ms || 0;
    var bc = r.status === "pass" ? "pass" : (r.status === "fail" ? "fail" : "warn");
    html += '<div class="card"><h2><span class="badge ' + bc + '">' + r.status.toUpperCase() + '</span> ' + r.name + ' <span class="mono">' + (r.ms || 0) + 'ms</span></h2>';
    if (r.detail) html += '<div class="detail">' + esc(r.detail) + '</div>';
    html += '</div>';
  }
  document.getElementById("results").innerHTML = html;
  document.getElementById("totalPass").textContent = pass;
  document.getElementById("totalFail").textContent = fail;
  document.getElementById("totalWarn").textContent = warn;
  document.getElementById("totalTime").textContent = totalMs;
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function testEndpoint(name, path, body) {
  return new Promise(function(resolve) {
    var start = Date.now();
    var xhr = new XMLHttpRequest();
    xhr.open("POST", path, true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        var ms = Date.now() - start;
        var text = xhr.responseText || "";
        var status = xhr.status;

        if (text.length > 0 && (text.charAt(0) === "{" || text.charAt(0) === "[")) {
          try {
            var json = JSON.parse(text);
            var isOk = status !== 502 && status !== 503;
            var detail = "HTTP " + status + "\n" + JSON.stringify(json, null, 2).substring(0, 500);
            addResult(name, isOk ? "pass" : "fail", ms, detail);
          } catch(e) {
            addResult(name, "warn", ms, "HTTP " + status + " - JSON parse error\n" + text.substring(0, 200));
          }
        } else {
          addResult(name, "fail", ms, "HTTP " + status + " — Got HTML instead of JSON.\nFunction may not be deployed or has a build error.\nFirst 100 chars: " + text.substring(0, 100));
        }
        resolve();
      }
    };
    xhr.onerror = function() {
      addResult(name, "fail", Date.now() - start, "Network error");
      resolve();
    };
    xhr.send(JSON.stringify(body));
  });
}

function runRegressionSuite() {
  var btn = document.getElementById("regBtn");
  btn.disabled = true;
  btn.textContent = "Fetching test vectors...";
  document.getElementById("regResults").style.display = "block";
  document.getElementById("regDetail").innerHTML = '<p style="color:#8b949e">Loading test vectors...</p>';
  document.getElementById("regSummaryBar").style.display = "none";

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/api/regression-test-authority", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          var vectors = data.vectors || [];
          if (vectors.length === 0) {
            document.getElementById("regDetail").innerHTML = '<p style="color:#ef4444">No test vectors returned</p>';
            btn.textContent = "Run Regression Suite";
            btn.disabled = false;
            return;
          }
          runVectorsFromBrowser(vectors, btn);
        } catch(e) {
          document.getElementById("regDetail").innerHTML = '<p style="color:#ef4444">Failed to parse test vectors</p>';
          btn.textContent = "Run Regression Suite";
          btn.disabled = false;
        }
      } else {
        document.getElementById("regDetail").innerHTML = '<p style="color:#ef4444">HTTP ' + xhr.status + ' — Could not fetch test vectors</p>';
        btn.textContent = "Run Regression Suite";
        btn.disabled = false;
      }
    }
  };
  xhr.send(JSON.stringify({ action: "get_test_vectors" }));
}

function runVectorsFromBrowser(vectors, btn) {
  var regResults = [];
  var idx = 0;
  var totalStart = Date.now();

  function updateProgress() {
    var passed = 0, failed = 0;
    for (var pi = 0; pi < regResults.length; pi++) {
      if (regResults[pi].status === "PASS") passed++;
      else failed++;
    }
    btn.textContent = "Running " + regResults.length + "/" + vectors.length + " (" + passed + " pass, " + failed + " fail)";
  }

  function runNext() {
    if (idx >= vectors.length) {
      btn.textContent = "Run Regression Suite";
      btn.disabled = false;
      finishRegression(regResults, Date.now() - totalStart);
      return;
    }
    var v = vectors[idx];
    idx++;
    var start = Date.now();
    var xr = new XMLHttpRequest();
    xr.open("POST", v.engine, true);
    xr.setRequestHeader("Content-Type", "application/json");
    xr.onreadystatechange = function() {
      if (xr.readyState === 4) {
        var ms = Date.now() - start;
        var result = validateVector(v, xr.status, xr.responseText, ms);
        regResults.push(result);
        updateProgress();
        renderRegProgressResults(regResults);
        runNext();
      }
    };
    xr.onerror = function() {
      regResults.push({ test_id: v.id, test_name: v.name, engine: v.engine, status: "FAIL", ms: Date.now() - start, failures: ["Network error"], passes: [] });
      updateProgress();
      renderRegProgressResults(regResults);
      runNext();
    };
    xr.send(JSON.stringify(v.input));
  }

  runNext();
}

function validateVector(v, httpStatus, responseText, ms) {
  var failures = [];
  var passes = [];
  var expect = v.expect || {};

  if (expect.status_code && httpStatus !== expect.status_code) {
    failures.push("Expected HTTP " + expect.status_code + " but got " + httpStatus);
  } else {
    passes.push("HTTP status: " + httpStatus);
  }

  var parsed = null;
  try { parsed = JSON.parse(responseText); } catch(e) {
    failures.push("Response is not valid JSON");
    return { test_id: v.id, test_name: v.name, engine: v.engine, status: failures.length > 0 ? "FAIL" : "PASS", ms: ms, failures: failures, passes: passes };
  }

  if (expect.not_error && parsed && parsed.error) {
    failures.push("Response contains error: " + String(parsed.error).substring(0, 200));
  } else if (expect.not_error) {
    passes.push("No error in response");
  }

  if (expect.has_fields && parsed) {
    for (var fi = 0; fi < expect.has_fields.length; fi++) {
      var fld = expect.has_fields[fi];
      if (parsed[fld] === undefined) {
        failures.push("Missing required field: " + fld);
      } else {
        passes.push("Field present: " + fld);
      }
    }
  }

  if (expect.field_values && parsed) {
    var vkeys = Object.keys(expect.field_values);
    for (var vi = 0; vi < vkeys.length; vi++) {
      var vk = vkeys[vi];
      if (parsed[vk] !== expect.field_values[vk]) {
        failures.push("Field " + vk + ": expected " + JSON.stringify(expect.field_values[vk]) + " but got " + JSON.stringify(parsed[vk]));
      } else {
        passes.push("Field " + vk + " = " + JSON.stringify(expect.field_values[vk]));
      }
    }
  }

  return { test_id: v.id, test_name: v.name, engine: v.engine, status: failures.length > 0 ? "FAIL" : "PASS", ms: ms, failures: failures, passes: passes };
}

function finishRegression(regResults, totalMs) {
  var passed = 0, failed = 0;
  for (var i = 0; i < regResults.length; i++) {
    if (regResults[i].status === "PASS") passed++;
    else failed++;
  }
  var rate = regResults.length > 0 ? Math.round((passed / regResults.length) * 10000) / 100 : 0;
  var verdict = failed === 0 ? "ALL_PASS" : (passed / regResults.length < 0.8 ? "CRITICAL_REGRESSION" : "REGRESSION_DETECTED");

  document.getElementById("regSummaryBar").style.display = "flex";
  var vc = verdict === "ALL_PASS" ? "#22c55e" : (verdict === "CRITICAL_REGRESSION" ? "#ef4444" : "#f59e0b");
  document.getElementById("regVerdict").textContent = verdict;
  document.getElementById("regVerdict").style.color = vc;
  document.getElementById("regPassed").textContent = passed;
  document.getElementById("regFailed").textContent = failed;
  document.getElementById("regRate").textContent = rate + "%";
  document.getElementById("regMs").textContent = totalMs;
}

function renderRegProgressResults(regResults) {
  var html = "";
  for (var i = 0; i < regResults.length; i++) {
    var r = regResults[i];
    var bc = r.status === "PASS" ? "pass" : "fail";
    html += '<div class="card" style="padding:12px;margin-bottom:6px"><h2 style="font-size:13px"><span class="badge ' + bc + '">' + r.status + '</span> ' + esc(r.test_name || r.test_id) + ' <span class="mono">' + (r.ms || 0) + 'ms</span></h2>';
    if (r.status === "FAIL" && r.failures && r.failures.length > 0) {
      var failInfo = "";
      for (var fi = 0; fi < r.failures.length; fi++) { failInfo += r.failures[fi] + "\n"; }
      html += '<div class="detail" style="margin-top:6px">' + esc(failInfo) + '</div>';
    }
    html += '</div>';
  }
  document.getElementById("regDetail").innerHTML = html;
}

function runRegressionCoverage() {
  var btn = document.getElementById("regCoverBtn");
  btn.disabled = true;
  btn.textContent = "Loading Coverage...";
  document.getElementById("regResults").style.display = "block";

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/api/regression-test-authority", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      btn.textContent = "Coverage Report";
      btn.disabled = false;
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          renderCoverage(data);
        } catch(e) {
          document.getElementById("regDetail").innerHTML = '<p style="color:#ef4444">Failed to parse coverage response</p>';
        }
      }
    }
  };
  xhr.send(JSON.stringify({ action: "get_coverage" }));
}

function renderCoverage(data) {
  document.getElementById("regSummaryBar").style.display = "none";
  var html = '<h2 style="color:#a5b4fc;font-size:15px;margin-bottom:12px">Test Coverage Report</h2>';
  html += '<p style="color:#8b949e;font-size:12px;margin-bottom:12px">Engines with test vectors: ' + (data.covered_count || 0) + ' / ' + (data.total_engines || 0) + ' (' + (data.coverage_pct || 0) + '%)</p>';

  if (data.covered && data.covered.length) {
    html += '<p style="color:#22c55e;font-size:12px;margin-bottom:4px">Covered:</p>';
    for (var ci = 0; ci < data.covered.length; ci++) {
      html += '<span class="badge pass" style="margin:2px">' + esc(data.covered[ci]) + '</span>';
    }
  }

  if (data.uncovered && data.uncovered.length) {
    html += '<p style="color:#f59e0b;font-size:12px;margin-bottom:4px;margin-top:8px">Not Yet Covered:</p>';
    for (var ui = 0; ui < data.uncovered.length; ui++) {
      html += '<span class="badge warn" style="margin:2px">' + esc(data.uncovered[ui]) + '</span>';
    }
  }

  document.getElementById("regDetail").innerHTML = html;
}
